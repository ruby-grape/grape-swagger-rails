name: Tests
on:
  push:
    branches:
      - master
  pull_request:
jobs:
  test:
    continue-on-error: ${{ matrix.experimental || false }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby: '3.2'
            rails: '7.2.2.2'
            grape: '~> 1.8.0'
            grape-swagger: '1.6.1'
          - ruby: '3.2'
            rails: '7.2.2.2'
            grape: '~> 3.1.0'
            grape-swagger: '2.1.4'
          - ruby: '3.3'
            rails: '7.2.2.2'
            grape: '~> 3.1.0'
            grape-swagger: '2.1.4'
          - ruby: '3.4'
            rails: '7.2.2.2'
            grape: '~> 3.1.0'
            grape-swagger: '2.1.4'
          - ruby: '3.2'
            rails: '~> 8.1.3'
            grape: '~> 3.1.0'
            grape-swagger: '2.1.4'
          - ruby: '3.3'
            rails: '~> 8.1.3'
            grape: '~> 3.1.0'
            grape-swagger: '2.1.4'
          - ruby: '3.4'
            rails: '~> 8.1.3'
            grape: '~> 3.1.0'
            grape-swagger: '2.1.4'
          - ruby: 'jruby-10.0.5.0'
            experimental: true
            java: '21'
            rails: '~> 8.1.3'
            grape: '~> 3.1.0'
            grape-swagger: '2.1.4'
    env:
      GRAPE_VERSION: ${{ matrix.grape }}
      GRAPE_SWAGGER_VERSION: ${{ matrix.grape-swagger }}
      RAILS_VERSION: ${{ matrix.rails }}
    steps:
      - uses: actions/checkout@v5
      - name: Set up Java
        if: ${{ matrix.java != '' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Print Bundler Versions
        run: bundle show
      - name: Setup Firefox
        uses: browser-actions/setup-firefox@v1
        with:
          firefox-version: "130.0"
      - uses: browser-actions/setup-geckodriver@latest
        with:
          geckodriver-version: "0.35.0"
      - name: Run tests with Sprockets
        uses: coactions/setup-xvfb@v1
        env:
          ASSET_PIPELINE: sprockets
        with:
          run: bundle exec rake spec
      - name: Run tests with Propshaft
        uses: coactions/setup-xvfb@v1
        env:
          ASSET_PIPELINE: propshaft
        with:
          run: bundle exec rake spec
